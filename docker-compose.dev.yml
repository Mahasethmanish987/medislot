version: "3.9"

services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    env_file:
      - .env.local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
    container_name: django_web

    command: sh -c "python manage.py collectstatic --noinput && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

    env_file:
      - .env.local

    volumes:
      - .:/app
      - static_volume:/vol/static
      - media_volume:/vol/media

    ports:
      - "8000:8000"

    depends_on:
      - db

volumes:
  postgres_data:
  static_volume:
  media_volume: