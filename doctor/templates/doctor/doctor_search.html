{% extends 'myapp/base.html' %}
{% load static %}

{% block title %}Find Doctors | MediSlot{% endblock %}

{% block css %}
<style>
    .fade-in {
        animation: fadeIn 0.3s ease-in-out;
    }
    
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .htmx-indicator {
        opacity: 0;
        transition: opacity 0.2s ease;
    }
    
    .htmx-request .htmx-indicator {
        opacity: 1;
    }
    
    .htmx-request.htmx-indicator {
        opacity: 1;
    }
</style>
{% endblock %}

{% block body %}
<!-- Hero Section with Search -->
<section class="bg-gradient-to-r from-blue-50 to-indigo-50 py-12">
    <div class="container mx-auto px-4">
        <div class="max-w-3xl mx-auto text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-3">
                Find Your Doctor
            </h1>
            <p class="text-gray-600 mb-6">
                Search by doctor name or department to find available appointments
            </p>
            
            <!-- Search Bar -->
            <div class="relative">
                <div class="relative">
                    <input type="text" 
                           name="q" 
                           id="search-input"
                           placeholder="Search by doctor name or department..." 
                           class="w-full px-5 py-4 pl-12 pr-20 text-gray-700 bg-white border border-gray-200 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200"
                           hx-get="{% url 'doctor:doctor_list' %}"
                           hx-target="#doctor-list-container"
                           hx-trigger="keyup changed delay:300ms, search"
                           hx-indicator="#loading-spinner"
                           hx-push-url="false"
                           hx-swap="innerHTML">
                    
                    <svg class="absolute left-4 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    
                    <button id="clear-search"
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 transition hidden"
                            onclick="clearSearch()">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Doctor List Container -->
<section class="py-8">
    <div class="container mx-auto px-4">
        <!-- Loading Spinner -->
        <div id="loading-spinner" class="htmx-indicator fixed inset-0 bg-black bg-opacity-30 flex items-center justify-center z-50 hidden">
            <div class="bg-white rounded-lg p-6 flex items-center space-x-3 shadow-xl">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                <span class="text-gray-700">Loading doctors...</span>
            </div>
        </div>
        
        <!-- Persistent container – never swapped out -->
        <div id="doctor-list-container">
            <!-- Initial loading state (will be replaced on first load) -->
            <div class="text-center py-12">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                <p class="text-gray-500 mt-3">Loading doctors...</p>
            </div>
        </div>
        
        <!-- Hidden element triggers the initial load (loads content into the persistent container) -->
        <div hx-get="{% url 'doctor:doctor_list' %}"
             hx-target="#doctor-list-container"
             hx-trigger="load"
             hx-swap="innerHTML"
             hx-indicator="#loading-spinner"
             style="display: none;"></div>
    </div>
</section>

<script>
    const searchInput = document.getElementById('search-input');
    const clearBtn = document.getElementById('clear-search');
    
    function toggleClearButton() {
        if (searchInput.value.length > 0) {
            clearBtn.classList.remove('hidden');
        } else {
            clearBtn.classList.add('hidden');
        }
    }
    
    function clearSearch() {
        searchInput.value = '';
        toggleClearButton();
        searchInput.dispatchEvent(new Event('keyup'));
    }
    
    searchInput.addEventListener('input', toggleClearButton);
</script>
{% endblock %}
