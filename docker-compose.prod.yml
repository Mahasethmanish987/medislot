version: "3.9"

services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
    container_name: web

    command: sh -c "python manage.py collectstatic --noinput && python manage.py migrate && gunicorn mysite.wsgi:application --bind 0.0.0.0:8000"

    env_file:
      - .env.prod

    volumes:
      - static_volume:/vol/static
      - media_volume:/vol/media

    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: nginx_server
    restart: always

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/vol/static
      - media_volume:/vol/media

    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume: