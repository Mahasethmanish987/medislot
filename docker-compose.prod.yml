version: "3.9"

services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
    container_name: web

    command: sh -c "python manage.py collectstatic --noinput && python manage.py migrate && gunicorn mysite.wsgi:application --bind 0.0.0.0:8000"

    env_file:
      - .env.prod

    volumes:
      - static_volume:/vol/static
      - media_volume:/vol/media

    depends_on:
      - db
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}   # optional password
    env_file:
      - .env.prod   # you can put REDIS_PASSWORD in .env.prod
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

      
  nginx:
    image: nginx:latest
    container_name: nginx_server
    restart: always

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/vol/static
      - media_volume:/vol/media

    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume:
  redis_data: