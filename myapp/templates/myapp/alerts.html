<!-- Alerts / Messages -->
{% if messages %}
    <div class="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 w-full max-w-md px-4" id="alert-container">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} mb-3 p-4 rounded-lg shadow-lg transition-all duration-300 transform hover:scale-105"
                 role="alert">
                <div class="flex items-start gap-3">
                    <!-- Icon based on message tag -->
                    <div class="flex-shrink-0">
                        {% if message.tags == 'success' %}
                            <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        {% elif message.tags == 'error' %}
                            <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        {% elif message.tags == 'warning' %}
                            <svg class="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                            </svg>
                        {% else %}
                            <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        {% endif %}
                    </div>
                    <div class="flex-1">
                        <p class="text-sm font-medium">{{ message }}</p>
                    </div>
                    <button type="button" class="alert-close flex-shrink-0 text-gray-400 hover:text-gray-600 transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>
        {% endfor %}
    </div>

    <style>
        .alert-success {
            background: #ecfdf5;
            border-left: 4px solid #10b981;
        }
        .alert-error {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
        }
        .alert-warning {
            background: #fffbeb;
            border-left: 4px solid #f59e0b;
        }
        .alert-info {
            background: #eff6ff;
            border-left: 4px solid #3b82f6;
        }
    </style>

    <script>
        // Auto-dismiss after 4 seconds
        document.querySelectorAll('.alert').forEach(alert => {
            setTimeout(() => {
                alert.style.opacity = '0';
                setTimeout(() => alert.remove(), 300);
            }, 4000);
        });
        // Close button
        document.querySelectorAll('.alert-close').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const alert = btn.closest('.alert');
                alert.style.opacity = '0';
                setTimeout(() => alert.remove(), 300);
            });
        });
    </script>
{% endif %}
